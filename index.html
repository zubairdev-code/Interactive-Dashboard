<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body id="body">
   <div class="header">
    <h1 id="main">Smart Dashboard</h1>
    <h3 id="time" style="color: #ffeb3b;"></h3>
     <div>
    <input type="text" name="" id="searchInp" placeholder="Search widgets...">
    <button id="searchBtn">Search</button>
    </div>
    <div>
        <button class="btn">Add Widget</button>
        <i class="fa-solid fa-moon" id="darkmode" style="margin-left: 10px;"></i>
    </div>
  
</div>
<div class="container">
    <div class="card" id="card">
        <h2 id="h2" class="h2">Islamic Quote</h2>
        <div class="contentDiv">
            <p id="p">"Whenever you face challenges, remember that difficulties are temporary and ease will follow. Stay patient, keep faith, and trust in Allah’s plan."</p>
            <p id="plength"></p>
            
        </div>

        <div class="btnDiv">
        <button  id="edit" class="editBtn">Edit</button>
        <button  id="del" class="deleteBtn">Delete</button>
        <input type="color" class="color" id="color">
        <button id="hideBtn" class="hideBtn">Hide</button>

    </div>
        
    </div>
</div>


    <script src="index.js"></script>
    <script src="index1.js"></script>
</body>
</html>
